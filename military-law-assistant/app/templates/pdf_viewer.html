<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | PDF Viewer</title>
    <style>
        :root {
            color-scheme: light;
            --primary: #0b0d94;
            --bg: #f3f6fb;
            --panel: #ffffff;
            --border: #d8dee9;
            --text: #1f2937;
            --muted: #667085;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Inter, Segoe UI, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .viewer-shell {
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .viewer-toolbar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: center;
            padding: 1rem 1.25rem;
            background: linear-gradient(135deg, var(--primary) 0%, #1d4ed8 100%);
            color: white;
            box-shadow: 0 6px 20px rgba(15, 23, 42, 0.18);
        }

        .viewer-title {
            font-size: 1rem;
            font-weight: 700;
        }

        .viewer-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .viewer-link {
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 999px;
            padding: 0.5rem 0.9rem;
            font-size: 0.88rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.08);
        }

        .viewer-content {
            padding: 1.25rem;
        }

        .viewer-status {
            margin-bottom: 1rem;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .viewer-grid {
            display: grid;
            grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
            gap: 1.25rem;
            align-items: start;
        }

        .viewer-sidebar,
        .viewer-main {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        .viewer-sidebar {
            padding: 1rem;
            position: sticky;
            top: 88px;
        }

        .viewer-main {
            padding: 1rem;
        }

        .control-group {
            margin-bottom: 1rem;
        }

        .control-label {
            display: block;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 0.45rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .control-row {
            display: flex;
            gap: 0.65rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .viewer-input,
        .viewer-button {
            border-radius: 8px;
            border: 1px solid var(--border);
            padding: 0.65rem 0.8rem;
            font: inherit;
        }

        .viewer-input {
            width: 100%;
            background: white;
            color: var(--text);
        }

        .viewer-input-small {
            width: 90px;
        }

        .viewer-button {
            background: #f8fafc;
            color: var(--text);
            cursor: pointer;
            font-weight: 600;
        }

        .viewer-button.primary {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .viewer-button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .result-list {
            display: grid;
            gap: 0.7rem;
            max-height: 55vh;
            overflow: auto;
            padding-right: 0.2rem;
        }

        .result-item {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.8rem;
            background: #f8fafc;
        }

        .result-item button {
            all: unset;
            cursor: pointer;
            display: block;
            width: 100%;
        }

        .result-page {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.3rem;
        }

        .result-snippet {
            color: var(--text);
            line-height: 1.45;
            font-size: 0.93rem;
        }

        mark {
            background: #fde68a;
            color: inherit;
            padding: 0 0.1rem;
            border-radius: 3px;
        }

        .page-stage {
            display: grid;
            justify-items: center;
            gap: 0.75rem;
        }

        .page-meta {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            width: min(100%, 980px);
            color: var(--muted);
            font-size: 0.9rem;
            flex-wrap: wrap;
        }

        .pdf-page {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.75rem;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            width: min(100%, 980px);
        }

        .pdf-page canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 6px;
        }

        @media (max-width: 980px) {
            .viewer-grid {
                grid-template-columns: 1fr;
            }

            .viewer-sidebar {
                position: static;
            }
        }
    </style>
</head>
<body>
    <div class="viewer-shell">
        <div class="viewer-toolbar">
            <div>
                <div class="viewer-title">{{ title }}</div>
                <div style="font-size:0.85rem; opacity:0.85;">Rendered inside the app</div>
            </div>
            <div class="viewer-actions">
                <a class="viewer-link" href="/law">Back to Assistant</a>
                <a class="viewer-link" href="{{ pdf_url }}" target="_blank" rel="noopener noreferrer">Open Raw PDF</a>
            </div>
        </div>
        <div class="viewer-content">
            <div id="viewerStatus" class="viewer-status">Loading PDF pages...</div>
            <div class="viewer-grid">
                <aside class="viewer-sidebar">
                    <div class="control-group">
                        <label class="control-label" for="searchInput">Search inside this PDF</label>
                        <div class="control-row">
                            <input id="searchInput" class="viewer-input" type="text" placeholder="Search sections, acts, procedures...">
                            <button id="searchBtn" class="viewer-button primary" type="button">Search</button>
                            <button id="clearSearchBtn" class="viewer-button" type="button">Clear</button>
                        </div>
                    </div>

                    <div class="control-group">
                        <label class="control-label">Page controls</label>
                        <div class="control-row">
                            <button id="prevPageBtn" class="viewer-button" type="button">Previous</button>
                            <input id="pageNumberInput" class="viewer-input viewer-input-small" type="number" min="1" value="1">
                            <button id="goToPageBtn" class="viewer-button" type="button">Go</button>
                            <button id="nextPageBtn" class="viewer-button" type="button">Next</button>
                        </div>
                    </div>

                    <div class="control-group">
                        <label class="control-label">Zoom</label>
                        <div class="control-row">
                            <button id="zoomOutBtn" class="viewer-button" type="button">-</button>
                            <input id="zoomRange" class="viewer-input" type="range" min="80" max="220" step="10" value="135">
                            <button id="zoomInBtn" class="viewer-button" type="button">+</button>
                        </div>
                    </div>

                    <div class="control-group">
                        <label class="control-label">Search results</label>
                        <div id="searchResults" class="result-list">
                            <div class="result-item">
                                <div class="result-snippet">Search the PDF to jump directly to relevant pages.</div>
                            </div>
                        </div>
                    </div>
                </aside>

                <main class="viewer-main">
                    <div class="page-stage">
                        <div class="page-meta">
                            <div id="pageIndicator">Page 1</div>
                            <div id="zoomIndicator">Zoom 135%</div>
                        </div>
                        <div id="pdfPages">
                            <div class="pdf-page">
                                <canvas id="pdfCanvas"></canvas>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        const pdfUrl = {{ pdf_url|tojson }};
        const viewerStatus = document.getElementById('viewerStatus');
        const pdfCanvas = document.getElementById('pdfCanvas');
        const pdfContext = pdfCanvas.getContext('2d');
        const pageIndicator = document.getElementById('pageIndicator');
        const zoomIndicator = document.getElementById('zoomIndicator');
        const prevPageBtn = document.getElementById('prevPageBtn');
        const nextPageBtn = document.getElementById('nextPageBtn');
        const goToPageBtn = document.getElementById('goToPageBtn');
        const pageNumberInput = document.getElementById('pageNumberInput');
        const zoomRange = document.getElementById('zoomRange');
        const zoomInBtn = document.getElementById('zoomInBtn');
        const zoomOutBtn = document.getElementById('zoomOutBtn');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        const searchResults = document.getElementById('searchResults');

        const state = {
            pdf: null,
            currentPage: 1,
            totalPages: 0,
            scale: 1.35,
            pageTexts: [],
            searchResults: [],
            currentSearchTerm: ''
        };

        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        async function renderPdf() {
            try {
                state.pdf = await pdfjsLib.getDocument(pdfUrl).promise;
                state.totalPages = state.pdf.numPages;
                pageNumberInput.max = String(state.totalPages);
                await indexPdfText();
                await renderCurrentPage();
                updateNavigationState();
                renderSearchResults([]);
                viewerStatus.textContent = `Loaded ${state.totalPages} page(s). Search the PDF or move page by page.`;
            } catch (error) {
                viewerStatus.textContent = 'Could not render the PDF in-app. Use "Open Raw PDF" above.';
                console.error(error);
            }
        }

        async function indexPdfText() {
            state.pageTexts = [];

            for (let pageNumber = 1; pageNumber <= state.totalPages; pageNumber += 1) {
                const page = await state.pdf.getPage(pageNumber);
                const textContent = await page.getTextContent();
                const text = textContent.items.map(item => item.str).join(' ');
                state.pageTexts.push(text);
            }
        }

        async function renderCurrentPage() {
            const page = await state.pdf.getPage(state.currentPage);
            const viewport = page.getViewport({ scale: state.scale });

            pdfCanvas.width = viewport.width;
            pdfCanvas.height = viewport.height;

            await page.render({
                canvasContext: pdfContext,
                viewport
            }).promise;

            pageIndicator.textContent = `Page ${state.currentPage} of ${state.totalPages}`;
            zoomIndicator.textContent = `Zoom ${Math.round(state.scale * 100)}%`;
            pageNumberInput.value = String(state.currentPage);
        }

        function updateNavigationState() {
            prevPageBtn.disabled = state.currentPage <= 1;
            nextPageBtn.disabled = state.currentPage >= state.totalPages;
        }

        async function goToPage(pageNumber) {
            const safePage = Math.max(1, Math.min(state.totalPages, pageNumber));
            if (safePage === state.currentPage && state.pdf) {
                pageNumberInput.value = String(safePage);
                return;
            }

            state.currentPage = safePage;
            await renderCurrentPage();
            updateNavigationState();
            pdfCanvas.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function highlightSnippet(text, query) {
            const escapedText = escapeHtml(text);
            const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return escapedText.replace(new RegExp(`(${escapedQuery})`, 'ig'), '<mark>$1</mark>');
        }

        function renderSearchResults(results) {
            if (!results.length) {
                searchResults.innerHTML = `
                    <div class="result-item">
                        <div class="result-snippet">
                            ${state.currentSearchTerm
                                ? `No matches for "${escapeHtml(state.currentSearchTerm)}".`
                                : 'Search the PDF to jump directly to relevant pages.'}
                        </div>
                    </div>
                `;
                return;
            }

            searchResults.innerHTML = results.map((result) => `
                <div class="result-item">
                    <button type="button" data-result-page="${result.page}">
                        <div class="result-page">Page ${result.page}</div>
                        <div class="result-snippet">${highlightSnippet(result.snippet, state.currentSearchTerm)}</div>
                    </button>
                </div>
            `).join('');
        }

        function searchPdf() {
            const query = searchInput.value.trim();
            state.currentSearchTerm = query;

            if (!query) {
                state.searchResults = [];
                renderSearchResults([]);
                viewerStatus.textContent = `Loaded ${state.totalPages} page(s). Search the PDF or move page by page.`;
                return;
            }

            const lowerQuery = query.toLowerCase();
            const results = [];

            state.pageTexts.forEach((text, index) => {
                const lowerText = text.toLowerCase();
                const matchIndex = lowerText.indexOf(lowerQuery);
                if (matchIndex === -1) {
                    return;
                }

                const start = Math.max(0, matchIndex - 80);
                const end = Math.min(text.length, matchIndex + query.length + 120);
                const snippet = text.slice(start, end).trim();
                results.push({
                    page: index + 1,
                    snippet: snippet || `Match found on page ${index + 1}.`
                });
            });

            state.searchResults = results;
            renderSearchResults(results);
            viewerStatus.textContent = results.length
                ? `Found ${results.length} page(s) matching "${query}".`
                : `No pages matched "${query}".`;

            if (results.length) {
                goToPage(results[0].page);
            }
        }

        function setZoom(percent) {
            const safePercent = Math.max(80, Math.min(220, percent));
            state.scale = safePercent / 100;
            zoomRange.value = String(safePercent);
            if (state.pdf) {
                renderCurrentPage();
            }
        }

        function bindEvents() {
            prevPageBtn.addEventListener('click', () => goToPage(state.currentPage - 1));
            nextPageBtn.addEventListener('click', () => goToPage(state.currentPage + 1));
            goToPageBtn.addEventListener('click', () => goToPage(Number(pageNumberInput.value)));
            pageNumberInput.addEventListener('keydown', (event) => {
                if (event.key === 'Enter') {
                    goToPage(Number(pageNumberInput.value));
                }
            });
            zoomRange.addEventListener('input', () => setZoom(Number(zoomRange.value)));
            zoomInBtn.addEventListener('click', () => setZoom(Math.round(state.scale * 100) + 10));
            zoomOutBtn.addEventListener('click', () => setZoom(Math.round(state.scale * 100) - 10));
            searchBtn.addEventListener('click', searchPdf);
            clearSearchBtn.addEventListener('click', () => {
                searchInput.value = '';
                searchPdf();
            });
            searchInput.addEventListener('keydown', (event) => {
                if (event.key === 'Enter') {
                    searchPdf();
                }
            });
            searchResults.addEventListener('click', async (event) => {
                const button = event.target.closest('[data-result-page]');
                if (!button) {
                    return;
                }

                await goToPage(Number(button.getAttribute('data-result-page')));
            });
        }

        bindEvents();
        renderPdf();
    </script>
</body>
</html>

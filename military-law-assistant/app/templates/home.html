<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visdroid Legal Suite</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* ───────── ORBITAL HOME ───────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #060b12;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* Starfield canvas */
        #stars { position: fixed; inset: 0; z-index: 0; }

        /* Page title */
        .page-title {
            position: relative;
            z-index: 10;
            text-align: center;
            margin-bottom: 10px;
            pointer-events: none;
        }
        .page-title h1 {
            font-size: clamp(1.4rem, 3.5vw, 2rem);
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.85);
        }
        .page-title p {
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.35);
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* ── Orbit scene ── */
        .scene {
            position: relative;
            z-index: 10;
            width: 560px;
            height: 560px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Background glow */
        .scene::before {
            content: '';
            position: absolute;
            inset: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(25,118,210,0.07) 0%, transparent 70%);
            animation: glow-pulse 4s ease-in-out infinite;
        }
        @keyframes glow-pulse {
            0%, 100% { opacity: 0.6; transform: scale(0.97); }
            50%       { opacity: 1;   transform: scale(1.03); }
        }

        /* Orbit ring */
        .orbit-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1.5px dashed rgba(255,255,255,0.12);
            animation: ring-spin 60s linear infinite;
        }
        .orbit-ring-inner {
            position: absolute;
            inset: 80px;
            border-radius: 50%;
            border: 1px solid rgba(25,118,210,0.18);
            animation: ring-spin 30s linear infinite reverse;
        }
        @keyframes ring-spin { to { transform: rotate(360deg); } }

        /* Hub (centre circle) */
        .hub {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120px; height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #1e3a5f, #0a1628);
            border: 2px solid rgba(25,118,210,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            box-shadow:
                0 0 0 6px rgba(25,118,210,0.06),
                0 0 40px rgba(25,118,210,0.2),
                inset 0 1px 1px rgba(255,255,255,0.1);
            z-index: 20;
        }
        .hub-logo {
            font-size: 2rem;
            font-weight: 900;
            font-style: italic;
            background: linear-gradient(135deg, #64b5f6, #1976d2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }
        .hub-sub {
            font-size: 0.5rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
        }

        /* ── Arms — zero-size pivots at centre that spin ──
           Three arms, each delayed by 1/3 of the period (6s)
           so satellites sit 120° apart.                       */
        .arm {
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            animation: arm-spin 18s linear infinite;
            z-index: 15;
        }
        .arm:nth-child(3) { animation-delay:  0s; }
        .arm:nth-child(4) { animation-delay: -6s; }
        .arm:nth-child(5) { animation-delay: -12s; }

        @keyframes arm-spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        /* ── Satellite cards ──
           orbit radius = 210px
           card size    = 110px × 110px
           top = -(210 + 55) = -265px (place card centre at radius)
           left = -55px (centre card horizontally)                    */
        .sat {
            position: absolute;
            top: -265px;
            left: -55px;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: rgba(15, 28, 50, 0.85);
            border: 1.5px solid rgba(255,255,255,0.13);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-decoration: none;
            color: #fff;
            cursor: pointer;
            backdrop-filter: blur(6px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
            /* Counter-rotate so the label stays upright */
            animation: sat-counter 18s linear infinite;
        }
        .arm:nth-child(3) .sat { animation-delay:  0s; }
        .arm:nth-child(4) .sat { animation-delay: -6s; }
        .arm:nth-child(5) .sat { animation-delay: -12s; }

        @keyframes sat-counter {
            from { transform: rotate(0deg); }
            to   { transform: rotate(-360deg); }
        }

        /* Active satellite */
        .sat.active {
            border-color: rgba(25,118,210,0.6);
            background: rgba(13, 40, 80, 0.9);
        }
        .sat.active:hover {
            border-color: #1976d2;
            box-shadow: 0 0 0 3px rgba(25,118,210,0.25), 0 8px 30px rgba(25,118,210,0.3);
            background: rgba(18, 55, 110, 0.95);
        }

        /* Locked satellite */
        .sat.locked { opacity: 0.4; cursor: default; }

        .sat i { font-size: 1.5rem; color: #64b5f6; }
        .sat.locked i { color: rgba(255,255,255,0.3); }

        .sat-label {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            text-align: center;
            padding: 0 6px;
            line-height: 1.3;
        }
        .sat.locked .sat-label { color: rgba(255,255,255,0.3); }

        .badge-soon {
            font-size: 0.44rem;
            letter-spacing: 0.1em;
            background: rgba(255,255,255,0.07);
            border-radius: 20px;
            padding: 2px 6px;
            color: rgba(255,255,255,0.25);
            text-transform: uppercase;
        }

        /* Glowing dots that travel on the ring */
        .dot {
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            animation: arm-spin 18s linear infinite;
        }
        .dot:nth-child(6) { animation-delay:  0s; }
        .dot:nth-child(7) { animation-delay: -6s; }
        .dot:nth-child(8) { animation-delay: -12s; }

        .dot::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            /* Place dot at orbit radius */
            transform: translate(-50%, calc(-280px - 50%));
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #1976d2;
            box-shadow: 0 0 8px 2px rgba(25,118,210,0.7);
        }

        /* Pause everything when hovering the scene */
        .scene:hover .arm,
        .scene:hover .sat,
        .scene:hover .orbit-ring,
        .scene:hover .dot {
            animation-play-state: paused;
        }

        /* Social footer */
        .footer {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 14px;
            margin-top: 18px;
        }
        .social-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.45);
            font-size: 0.9rem;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }
        .social-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

        /* Responsive scaling */
        @media (max-width: 620px) {
            .scene { transform: scale(0.62); transform-origin: center; margin: -100px 0; }
        }
        @media (max-width: 380px) {
            .scene { transform: scale(0.48); margin: -150px 0; }
        }
    </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="page-title">
    <h1>Visdroid</h1>
    <p>Legal Suite &mdash; Select a module</p>
</div>

<div class="scene">
    <!-- Orbit rings (decorative) -->
    <div class="orbit-ring"></div>
    <div class="orbit-ring-inner"></div>

    <!-- Centre hub -->
    <div class="hub">
        <span class="hub-logo">V</span>
        <span class="hub-sub">Legal</span>
    </div>

    <!-- Arm 1 · Law Assistant (active) -->
    <div class="arm">
        <a href="/law" class="sat active">
            <i class="bi bi-balance-scale"></i>
            <span class="sat-label">Law<br>Assistant</span>
        </a>
    </div>

    <!-- Arm 2 · Documents (locked) -->
    <div class="arm">
        <div class="sat locked" title="Coming soon">
            <i class="bi bi-file-earmark-text"></i>
            <span class="sat-label">Documents</span>
            <span class="badge-soon">Soon</span>
        </div>
    </div>

    <!-- Arm 3 · Case Tracker (locked) -->
    <div class="arm">
        <div class="sat locked" title="Coming soon">
            <i class="bi bi-journal-bookmark"></i>
            <span class="sat-label">Case<br>Tracker</span>
            <span class="badge-soon">Soon</span>
        </div>
    </div>

    <!-- Glowing dots on the orbit ring -->
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
</div>

<div class="footer">
    <a href="#!" class="social-btn" aria-label="Twitter"><i class="bi bi-twitter-x"></i></a>
    <a href="#!" class="social-btn" aria-label="Facebook"><i class="bi bi-facebook"></i></a>
    <a href="#!" class="social-btn" aria-label="LinkedIn"><i class="bi bi-linkedin"></i></a>
</div>

<script>
    // Twinkling starfield
    (function () {
        const canvas = document.getElementById('stars');
        const ctx    = canvas.getContext('2d');
        let stars    = [];

        function resize() {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function init() {
            resize();
            stars = Array.from({ length: 180 }, () => ({
                x:     Math.random() * canvas.width,
                y:     Math.random() * canvas.height,
                r:     Math.random() * 1.2 + 0.3,
                alpha: Math.random() * 0.6 + 0.1,
            }));
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.alpha += (Math.random() - 0.5) * 0.018;
                s.alpha  = Math.min(0.75, Math.max(0.05, s.alpha));
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(180,210,255,${s.alpha})`;
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    })();
</script>
</body>
</html>
